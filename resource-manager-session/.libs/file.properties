otel.javaagent.debug=true

otel.traces.exporter=otlp
otel.metrics.exporter=otlp
otel.logs.exporter=otlp

otel.exporter.otlp.protocol=grpc
otel.exporter.otlp.timeout=5000
otel.exporter.otlp.endpoint=http://otel-collector:4317

otel.exporter.otlp.metrics.headers=key1=demo1,key2=value2,key3=zzz1
otel.exporter.otlp.metrics.timeout=5000

otel.exporter.logging.prefix=zzz
otel.propagators=tracecontext,baggage,b3multi

otel.service.name=app-module-one
otel.resource.attributes=service.name=module-one-service,service.namespace=com-kpn-observability,service.version=1.0-SNAPSHOT,deployment.environment=dev
