# Combined local development Docker Compose
#
# Starts: Neo4j, Zookeeper, Kafka (kafka-ndsal-broker), AKHQ
#
# Usage:
#   docker compose up -d                  # start all infrastructure
#   docker compose up -d neo4j            # start only Neo4j
#   docker compose up -d kafka-ndsal-broker akhq zookeeper  # start only Kafka stack
#   docker compose down                   # stop all
#   docker compose down -v                # stop all and remove volumes
#
# UIs:
#   Neo4j browser : http://localhost:7474/   (credentials: neo4j / neo4j)
#   AKHQ Kafka GUI: http://localhost:8082/
#
# IMPORTANT: Add the following to your hosts file before starting Kafka:
#   127.0.0.1  kafka-ndsal-broker
#   Windows path: C:\Windows\System32\drivers\etc\hosts
#   Linux/Mac   : /etc/hosts

version: '3.8'

networks:
  resource-manager-net:
    name: resource-manager-net
    driver: bridge

services:

  # ─── Neo4j ──────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.2.0-enterprise
    hostname: neo4j
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      - NEO4J_AUTH=neo4j/neo4j
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4JLABS_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_allowlist=gds.*, apoc.*
      - NEO4J_dbms_security_procedures_unrestricted=gds.*, apoc.*
    volumes:
      - neo4j-data:/var/lib/neo4j/data
    networks:
      - resource-manager-net
    healthcheck:
      test: [ "CMD-SHELL", "/var/lib/neo4j/bin/neo4j status" ]
      interval: 10s
      timeout: 5s
      retries: 20

  # ─── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.9.2
    hostname: zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_SERVER_ID=1
      - ZOO_MAX_CNXNS=10
      - ZOO_SERVERS=zookeeper:2888:3888
    volumes:
      - zookeeper-data:/bitnami/zookeeper
    networks:
      - resource-manager-net

  # ─── Kafka ──────────────────────────────────────────────────────────────────
  kafka-ndsal-broker:
    image: bitnami/kafka:3.7.0
    hostname: kafka-ndsal-broker
    stop_grace_period: "60s"
    ports:
      - '9092:9092'
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_CLUSTER_ID=kafka-ndsal-cluster
      - ALLOW_PLAINTEXT_LISTENER=yes
      # CLIENT listener → Spring Boot apps on host connect via localhost:9092
      # INTERNAL listener → AKHQ and other containers connect via kafka-ndsal-broker:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CLIENT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_LISTENERS=CLIENT://:9092,INTERNAL://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=CLIENT://localhost:9092,INTERNAL://kafka-ndsal-broker:9093
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - resource-manager-net
    depends_on:
      - zookeeper

  # ─── AKHQ (Kafka GUI) ───────────────────────────────────────────────────────
  akhq:
    image: tchiotludo/akhq:latest
    hostname: akhq
    ports:
      - '8082:8080'
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            kafka-ndsal:
              properties:
                bootstrap.servers: "kafka-ndsal-broker:9093"
    networks:
      - resource-manager-net
    depends_on:
      - kafka-ndsal-broker

volumes:
  neo4j-data:
  zookeeper-data:
  kafka-data:
